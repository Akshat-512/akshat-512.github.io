name: Publish From Issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Guard - owner and label check
        id: guard
        run: |
          set -euo pipefail

          issue_user="$(jq -r '.issue.user.login // ""' "$GITHUB_EVENT_PATH")"
          author_association="$(jq -r '.issue.author_association // ""' "$GITHUB_EVENT_PATH")"
          issue_labels="$(jq -r '[.issue.labels[].name] | join(",")' "$GITHUB_EVENT_PATH")"
          issue_body="$(jq -r '.issue.body // ""' "$GITHUB_EVENT_PATH")"

          issue_user_lc="$(printf '%s' "$issue_user" | tr '[:upper:]' '[:lower:]')"
          repo_owner_lc="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          author_association_uc="$(printf '%s' "$author_association" | tr '[:lower:]' '[:upper:]')"

          is_owner="false"
          is_trusted_author="false"
          has_label="false"
          has_publish_body="false"

          if [ "$issue_user_lc" = "$repo_owner_lc" ]; then
            is_owner="true"
          fi

          case "$author_association_uc" in
            OWNER|MEMBER|COLLABORATOR) is_trusted_author="true" ;;
          esac

          case ",$issue_labels," in
            *,publish-post,*) has_label="true" ;;
          esac

          # Accept issues created from the publish page/form even if label assignment failed.
          if printf '%s\n' "$issue_body" | grep -q '^### Section$' && \
             printf '%s\n' "$issue_body" | grep -q '^### Content$'; then
            has_publish_body="true"
          fi

          # Allow trusted maintainers/collaborators in addition to strict repo owner.
          if { [ "$is_owner" = "true" ] || [ "$is_trusted_author" = "true" ]; } && \
             { [ "$has_label" = "true" ] || [ "$has_publish_body" = "true" ]; }; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=false" >> "$GITHUB_OUTPUT"
          echo "Skipping publish: is_owner=$is_owner is_trusted_author=$is_trusted_author author_association=$author_association has_label=$has_label has_publish_body=$has_publish_body labels=$issue_labels issue_user=$issue_user repo_owner=${{ github.repository_owner }}"

      - name: Checkout
        if: steps.guard.outputs.should_publish == 'true'
        uses: actions/checkout@v4

      - name: Create post from issue form
        if: steps.guard.outputs.should_publish == 'true'
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          extract_block() {
            local heading="$1"
            awk -v key="### ${heading}" '
              { gsub(/\r$/, "") }
              $0 == key { flag=1; next }
              flag && /^### / { flag=0 }
              flag { print }
            ' <<< "$ISSUE_BODY"
          }

          trim() {
            sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
          }

          # awk 'NF{print;exit}' prints the first non-blank line (safe with pipefail).
          section="$(extract_block "Section" | trim | awk 'NF{print;exit}')"
          tags_raw="$(extract_block "Tags" | trim | awk 'NF && !/^_No response_$/{print;exit}')"
          content="$(extract_block "Content" | sed '/./,$!d')"

          if [ -z "${section}" ] || [ -z "${content}" ]; then
            echo "Missing required section/content in issue form."
            exit 1
          fi

          case "$section" in
            articles|music|books|movies) ;;
            *) echo "Invalid section: $section"; exit 1 ;;
          esac

          slug="$(
            echo "$ISSUE_TITLE" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g'
          )"
          if [ -z "$slug" ]; then
            echo "Invalid issue title for slug."
            exit 1
          fi

          date="$(date +%Y-%m-%d)"
          dir="content/${section}"
          file="${dir}/${date}-${slug}.md"
          mkdir -p "$dir"

          if [ -e "$file" ]; then
            echo "File already exists: $file"
            exit 1
          fi

          tags_json="[]"
          if [ -n "$tags_raw" ]; then
            tags_json="$(
              echo "$tags_raw" \
                | awk -F',' '
                    BEGIN { printf "["; first=1 }
                    {
                      for (i=1; i<=NF; i++) {
                        gsub(/^[ \t]+|[ \t]+$/, "", $i)
                        if ($i != "") {
                          if (!first) printf ", "
                          gsub(/"/, "\\\"", $i)
                          printf "\"%s\"", $i
                          first=0
                        }
                      }
                    }
                    END { printf "]" }
                  '
            )"
          fi

          safe_title="$(printf '%s' "$ISSUE_TITLE" | sed 's/"/\\"/g')"

          {
            printf '+++\n'
            printf 'title = "%s"\n' "$safe_title"
            printf 'date = %s\n' "$date"
            printf 'draft = false\n'
            printf '[taxonomies]\n'
            printf 'tags = %s\n' "$tags_json"
            printf '+++\n\n'
            printf '%s\n' "$content"
          } > "$file"

          echo "Created $file"
          echo "NEW_FILE=$file" >> "$GITHUB_ENV"

      - name: Commit and push
        if: steps.guard.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$NEW_FILE"
          git commit -m "Publish post from issue #${{ github.event.issue.number }}"
          git push

      - name: Comment and close issue
        if: steps.guard.outputs.should_publish == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const section = `${{ env.NEW_FILE }}`.split('/')[1];
            const filename = `${{ env.NEW_FILE }}`.split('/').pop();
            const slug = filename.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace(/\.md$/, '');
            const url = `https://akshat-512.github.io/${section}/${slug}/`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Published: ${url}`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });
